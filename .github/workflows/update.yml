name: Update Lotto Data

on:
  schedule:
    # Wt/Czw/Sob o 22:30 UTC (losowanie ~21:40 PL czasu)
    - cron: '30 20 * * 2,4,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build HTML
        run: python build_lotto.py

      - name: Commit i push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Brak zmian, pomijam commit." || \
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
