name: Update Lotto Data

on:
  schedule:
    # Wt/Czw/Sob o 22:30 UTC = 00:30 CEST (losowanie ~21:40 PL, margines na dane)
    - cron: '30 22 * * 2,4,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build HTML
        run: python build_lotto.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Brak zmian w index.html, pomijam commit."
          else
            git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
